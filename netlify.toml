[build]
  publish = "."

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Netlify Function — AI 챗 프록시 (ANTHROPIC_API_KEY_BAEPO env var 설정 필요)
[functions]
  directory = "netlify/functions"
